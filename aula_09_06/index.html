<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastrar Skin</title>
</head>
<body>
  <h1>Cadastrar Skin</h1>

  <label>Name: <input type="text" id="name"></label><br><br>
  <label>Sense: <input type="number" step="any" id="sense"></label><br><br>
  <label>Resolution: <input type="text" step="any" id="resolution"></label><br><br>
  <label>DPI: <input type="number" id="dpi"></label><br><br>
  <button id="btn">Cadastrar</button>

  <pre id="resposta"></pre>

  <script>
    const butao = document.getElementById('btn');
    butao.addEventListener('click', async function () {
      const name = document.getElementById('name').value;
      const sense = Number(document.getElementById('sense').value);
      const resolution = Number(document.getElementById('resolution').value);
      const dpi = document.getElementById('dpi').value;

      const response = await fetch('https://6a289aa74e1e783349a5b325.mockapi.io/web/2026/players', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, sense, resolution, dpi }),
      });

      const data = await response.json();
      document.getElementById('resposta').textContent = JSON.stringify(data);
    });
  </script>
</body>
</html>
